# Application ID
appId: com.numara.app

# Publish configuration
publish:
  - provider: github
    releaseType: release

# Directories configuration
directories:
  buildResources: build/assets
  output: 'dist/${version}/${os}'

# Files to include in the build
files:
  - build
  - src/electron/main.js
  - src/electron/preload.cjs
  - '!**/*.map'

# Linux configuration
linux:
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64
  artifactName: '${productName}-${version}-${arch}.${ext}'

# macOS configuration
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - universal
  artifactName: '${productName}-${version}.${ext}'
  entitlements: src/misc/entitlements.mac.plist
  entitlementsInherit: src/misc/entitlements.mac.plist
  hardenedRuntime: true

# Windows configuration
win:
  target:
    - target: nsis-web
      arch:
        - x64
        - arm64
  verifyUpdateCodeSignature: false
  azureSignOptions:
    publisherName: 'Timur Atalay'
    endpoint: 'https://wus.codesigning.azure.net'
    certificateProfileName: 'NumaraCertProfile'
    codeSigningAccountName: 'Numara'

# Web NSIS installer configuration
nsisWeb:
  deleteAppDataOnUninstall: true
  oneClick: false
  artifactName: '${productName}-${version}.${ext}'

# File associations configuration
fileAssociations:
  - ext: num
    name: Numara Document
    role: Editor
    description: Numara calculation file
